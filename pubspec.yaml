name: timeguard
description: "TimeGuard - App usage time management and self-discipline tool"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Local storage
  sqflite: ^2.3.3+1
  shared_preferences: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.4

  # Platform services
  usage_stats: ^1.3.0
  installed_apps: ^1.5.0
  flutter_local_notifications: ^17.2.3
  flutter_foreground_task: ^8.17.0
  workmanager: ^0.6.0
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2
  app_settings: ^5.1.1

  # Charts
  fl_chart: ^0.68.0

  # UI
  flutter_svg: ^2.0.10+1
  percent_indicator: ^4.2.3
  intl: ^0.19.0

  # Utils
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/lottie/
